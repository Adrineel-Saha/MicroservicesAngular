<h3>List of Users</h3>
<table class="table table-bordered">
  <thead>
  <tr>
    <th scope="col">User_Id</th>
    <th scope="col">User_Name</th>
    <th scope="col">Email</th>
  </tr>
</thead>
  <tbody>
  <tr *ngFor="let user of users">
    <td>{{user.id}}</td>
    <td>{{user.userName}}</td>
    <td>{{user.email}}</td>
  </tr>
  </tbody>
</table>
